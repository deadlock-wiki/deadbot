name: Release

on:
  push:
    branches: [ "master" ]

  pull_request:
    branches: [ "master" ]

env:
  # matches docker-compose.yml
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}


jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    env:
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get master branch data
        if: github.event_name == 'pull_request'
        run: git fetch origin master:master

      - name: Increment version
        if: github.event_name == 'pull_request'
        run: |
          chmod +x ./.github/workflows/scripts/increment_release_version.sh 
          ./.github/workflows/scripts/increment_release_version.sh 

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934 # v5.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          target: build
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=deadbot-build-master
            type=gha,scope=deadbot-build-${{ env.BRANCH_NAME }}
          cache-to: type=gha,mode=max,scope=deadbot-build-${{ env.BRANCH_NAME }}

      - name: Restore Nuitka cache
        if: github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.nuitka-cache
          key: nuitka-${{ env.BRANCH_NAME }}-${{ hashFiles('src/**/*.py', 'pyproject.toml') }}
          restore-keys: |
            nuitka-${{ env.BRANCH_NAME }}-
            nuitka-master-

      - name: Build deadbot executable
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p ${{ github.workspace }}/.nuitka-cache
          docker run --rm \
            -v ${{ github.workspace }}/dist:/repo/dist \
            -v ${{ github.workspace }}/.nuitka-cache:/root/.cache/Nuitka \
            --entrypoint bash \
            ${{ steps.build-and-push.outputs.imageid }} \
            -c "poetry run nuitka ./src/deadbot.py \
                --onefile \
                --output-dir=/repo/dist \
                --jobs=$(nproc) \
                --lto=no \
                --python-flag=no_site,no_warnings \
                --include-data-dir=./src/parser/parsers/game_map/assets=parser/parsers/game_map/assets \
                --include-data-dir=./src/tools=tools \
                --include-data-files=./src/steam/steam_db_download_deadlock.sh=steam/steam_db_download_deadlock.sh \
                --include-data-files=./src/steam/depot_downloader_file_list.txt=steam/depot_downloader_file_list.txt \
                --assume-yes-for-downloads"
              
      - name: Get version from pyproject.toml
        if: github.event_name != 'pull_request'
        id: get_version
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/version *= *"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release tag
        if: github.event_name != 'pull_request'
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git tag "v${{ steps.get_version.outputs.version }}"
          git push origin "v${{ steps.get_version.outputs.version }}"
          
      - name: Create GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ steps.get_version.outputs.version }}"
          files: ./dist/deadbot.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  merge-back-to-develop:
    name: Merge master back to develop
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name != 'pull_request'
    permissions:
      contents: write # Needed to push to the develop branch
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0 # Fetch all history for merging

      - name: Configure Git
        run: |
          git config --global user.name "Deadbot0"
          git config --global user.email "deadbot1101@gmail.com"

      - name: Merge master into develop and push
        run: |
          git switch develop
          git pull origin develop
          git merge master
          git push origin develop
